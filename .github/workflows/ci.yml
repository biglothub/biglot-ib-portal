name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint → Type-check → Test → Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Svelte sync
        run: npx svelte-kit sync

      - name: Type-check
        run: npx svelte-check --tsconfig ./tsconfig.json --threshold error --compiler-warnings "css_unused_selector:ignore"
        continue-on-error: true

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: placeholder
          PUBLIC_SENTRY_DSN: ""
          PUBLIC_SENTRY_ENVIRONMENT: ci
          PUBLIC_APP_URL: http://localhost:3000

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: E2E Tests
        run: npm run test:e2e -- --project=chromium
        env:
          PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: placeholder
          PUBLIC_SENTRY_DSN: ""
          PUBLIC_SENTRY_ENVIRONMENT: ci
          PUBLIC_APP_URL: http://localhost:4173
          OPENAI_API_KEY: sk-placeholder

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
