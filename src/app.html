<html lang="th">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="theme-color" content="#0a0a0a" />
	<link rel="icon" href="/favicon.ico" sizes="48x48" />
	<link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16" />
	<link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />
	<meta name="description" content="IB Portal — ระบบจัดการพอร์ตการเทรดสำหรับ Introducing Broker และลูกค้า" />

	<!-- PWA Manifest -->
	<link rel="manifest" href="/manifest.json" />

	<!-- iOS PWA -->
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<meta name="apple-mobile-web-app-title" content="IB Portal" />
	<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
	<meta name="format-detection" content="telephone=no" />

	<!-- Apple Splash Screens -->
	<link rel="apple-touch-startup-image" href="/splash/splash-750x1334.png"
		media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
	<link rel="apple-touch-startup-image" href="/splash/splash-1242x2208.png"
		media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" />
	<link rel="apple-touch-startup-image" href="/splash/splash-1125x2436.png"
		media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
	<link rel="apple-touch-startup-image" href="/splash/splash-828x1792.png"
		media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
	<link rel="apple-touch-startup-image" href="/splash/splash-1242x2688.png"
		media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
	<link rel="apple-touch-startup-image" href="/splash/splash-1080x2340.png"
		media="(device-width: 360px) and (device-height: 780px) and (-webkit-device-pixel-ratio: 3)" />
	<link rel="apple-touch-startup-image" href="/splash/splash-1170x2532.png"
		media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
	<link rel="apple-touch-startup-image" href="/splash/splash-1284x2778.png"
		media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
	<link rel="apple-touch-startup-image" href="/splash/splash-1179x2556.png"
		media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
	<link rel="apple-touch-startup-image" href="/splash/splash-1290x2796.png"
		media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
	<link rel="apple-touch-startup-image" href="/splash/splash-1206x2622.png"
		media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)" />
	<link rel="apple-touch-startup-image" href="/splash/splash-1320x2868.png"
		media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" />
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
	<noscript><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
	%sveltekit.head%
	<script>
		(function() {
			var stored = localStorage.getItem('ib-portal-theme');
			var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'dark';
			var dark = mode === 'system'
				? window.matchMedia('(prefers-color-scheme: dark)').matches
				: mode === 'dark';
			if (dark) {
				document.documentElement.classList.add('dark');
			} else {
				document.documentElement.classList.remove('dark');
			}
			var meta = document.querySelector('meta[name="theme-color"]');
			if (meta) meta.setAttribute('content', dark ? '#0a0a0a' : '#f8fafc');
		})();
	</script>
</head>

<body data-sveltekit-preload-data="tap">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
